# Cobalt API self-hosted instance for DropZap
# Deploy this to Render as a separate service, then set:
#   COBALT_API_URLS=https://your-cobalt-service.onrender.com
# in your DropZap environment variables.

services:
  - type: web
    name: dropzap-cobalt
    runtime: image
    image:
      url: ghcr.io/imputnet/cobalt:11
    plan: free
    region: frankfurt
    healthCheckPath: /api/serverInfo
    envVars:
      - key: API_URL
        value: https://dropzap-cobalt.onrender.com
      - key: API_AUTH_REQUIRED
        value: "0"
      - key: RATELIMIT_MAX
        value: "100"
      - key: RATELIMIT_WINDOW
        value: "60"
