<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760" width="1270" height="760">
  <!-- Gallery image #1: the hero shot. This is the first image users see
       and the one used as the social-preview when the PH link is shared
       to Twitter/LinkedIn. So it has to land the value prop in under 2
       seconds of viewing time. -->
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="50%" stop-color="#1a0d2e"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(147, 51, 234, 0.4)"/>
      <stop offset="100%" stop-color="rgba(147, 51, 234, 0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1270" height="760" fill="url(#bg2)"/>

  <!-- Soft purple glow behind content -->
  <ellipse cx="635" cy="420" rx="600" ry="350" fill="url(#glow)"/>

  <!-- Logo + brand name (top center) -->
  <g transform="translate(525, 90)">
    <!-- Bolt panel -->
    <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#boltGrad)"/>
    <path d="M 38 12 L 22 36 L 30 36 L 26 52 L 42 28 L 34 28 L 38 12 Z"
          fill="white" transform="translate(0,0)"/>
    <!-- Brand text -->
    <text x="80" y="42" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="36" font-weight="800" fill="white" letter-spacing="-0.5">DropZap</text>
  </g>

  <!-- Headline -->
  <text x="635" y="260" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="72" font-weight="900" fill="white" letter-spacing="-2">
    One downloader.
  </text>
  <text x="635" y="340" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="72" font-weight="900" letter-spacing="-2"
        fill="url(#brandGrad)">
    Every platform you use.
  </text>

  <!-- Subhead -->
  <text x="635" y="400" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="26" font-weight="400" fill="#a0a0c0" letter-spacing="0">
    Free, mobile-first video downloader for Instagram, TikTok, Facebook,
  </text>
  <text x="635" y="436" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="26" font-weight="400" fill="#a0a0c0" letter-spacing="0">
    Twitter/X, Reddit, Pinterest, Threads &amp; YouTube thumbnails.
  </text>

  <!-- Platform pills row -->
  <g transform="translate(0, 510)">
    <!-- Pill 1: Instagram -->
    <g transform="translate(180, 0)">
      <rect width="140" height="56" rx="28" fill="url(#cardGrad)" stroke="rgba(236, 72, 153, 0.4)" stroke-width="1.5"/>
      <circle cx="28" cy="28" r="12" fill="#ec4899"/>
      <text x="50" y="36" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
            font-size="18" font-weight="600" fill="white">Instagram</text>
    </g>
    <!-- Pill 2: TikTok -->
    <g transform="translate(340, 0)">
      <rect width="110" height="56" rx="28" fill="url(#cardGrad)" stroke="rgba(6, 182, 212, 0.4)" stroke-width="1.5"/>
      <circle cx="28" cy="28" r="12" fill="#06b6d4"/>
      <text x="50" y="36" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
            font-size="18" font-weight="600" fill="white">TikTok</text>
    </g>
    <!-- Pill 3: Facebook -->
    <g transform="translate(470, 0)">
      <rect width="130" height="56" rx="28" fill="url(#cardGrad)" stroke="rgba(59, 130, 246, 0.4)" stroke-width="1.5"/>
      <circle cx="28" cy="28" r="12" fill="#3b82f6"/>
      <text x="50" y="36" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
            font-size="18" font-weight="600" fill="white">Facebook</text>
    </g>
    <!-- Pill 4: Twitter -->
    <g transform="translate(620, 0)">
      <rect width="100" height="56" rx="28" fill="url(#cardGrad)" stroke="rgba(14, 165, 233, 0.4)" stroke-width="1.5"/>
      <circle cx="28" cy="28" r="12" fill="#0ea5e9"/>
      <text x="50" y="36" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
            font-size="18" font-weight="600" fill="white">X/Twitter</text>
    </g>
    <!-- Pill 5: Reddit -->
    <g transform="translate(740, 0)">
      <rect width="110" height="56" rx="28" fill="url(#cardGrad)" stroke="rgba(249, 115, 22, 0.4)" stroke-width="1.5"/>
      <circle cx="28" cy="28" r="12" fill="#f97316"/>
      <text x="50" y="36" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
            font-size="18" font-weight="600" fill="white">Reddit</text>
    </g>
    <!-- Pill 6: +3 more -->
    <g transform="translate(870, 0)">
      <rect width="130" height="56" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="6 4"/>
      <text x="65" y="36" text-anchor="middle"
            font-family="system-ui, -apple-system, Segoe UI, sans-serif"
            font-size="18" font-weight="600" fill="#a0a0c0">+3 more</text>
    </g>
  </g>

  <!-- Bottom badge row -->
  <g transform="translate(635, 660)">
    <text text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="20" font-weight="500" fill="#a0a0c0" letter-spacing="3">
      NO SIGNUP   ·   NO WATERMARK   ·   NO APP INSTALL
    </text>
  </g>
</svg>
