<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760" width="1270" height="760">
  <!-- Gallery image #5: closer / call-to-action. Big URL, social proof,
       and the brand-gradient lockup. -->
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="bolt6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="urlGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow6" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="rgba(236, 72, 153, 0.4)"/>
      <stop offset="100%" stop-color="rgba(236, 72, 153, 0)"/>
    </radialGradient>
  </defs>

  <rect width="1270" height="760" fill="url(#bg6)"/>

  <!-- Centered radial glow -->
  <ellipse cx="635" cy="380" rx="500" ry="300" fill="url(#glow6)"/>

  <!-- Top logo lockup -->
  <g transform="translate(575, 130)">
    <rect width="120" height="120" rx="28" fill="url(#bolt6)"/>
    <path d="M 72 22 L 38 64 L 52 64 L 46 98 L 80 56 L 66 56 L 72 22 Z" fill="white"/>
  </g>

  <!-- Brand name -->
  <text x="635" y="310" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="64" font-weight="900" fill="white" letter-spacing="-2">
    DropZap
  </text>

  <!-- Tagline -->
  <text x="635" y="365" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="26" font-weight="500" fill="#a0a0c0" letter-spacing="0">
    The video downloader that just works.
  </text>

  <!-- Big URL -->
  <text x="635" y="490" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="56" font-weight="900" letter-spacing="-1.5"
        fill="url(#urlGrad)">
    www.dropzap.digital
  </text>

  <!-- Underline -->
  <rect x="335" y="510" width="600" height="3" rx="1.5" fill="url(#urlGrad)" opacity="0.5"/>

  <!-- Three feature pills -->
  <g transform="translate(635, 590)">
    <g transform="translate(-330, 0)">
      <rect width="200" height="56" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <circle cx="28" cy="28" r="10" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="2"/>
      <path d="M 24 28 L 27 31 L 33 25" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="36" font-family="system-ui, -apple-system, sans-serif"
            font-size="18" font-weight="600" fill="white">100% free</text>
    </g>
    <g transform="translate(-100, 0)">
      <rect width="200" height="56" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <circle cx="28" cy="28" r="10" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="2"/>
      <path d="M 24 28 L 27 31 L 33 25" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="36" font-family="system-ui, -apple-system, sans-serif"
            font-size="18" font-weight="600" fill="white">No signup</text>
    </g>
    <g transform="translate(130, 0)">
      <rect width="200" height="56" rx="28" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <circle cx="28" cy="28" r="10" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="2"/>
      <path d="M 24 28 L 27 31 L 33 25" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="36" font-family="system-ui, -apple-system, sans-serif"
            font-size="18" font-weight="600" fill="white">No watermark</text>
    </g>
  </g>

  <!-- Bottom microcopy -->
  <text x="635" y="700" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="16" font-weight="400" fill="#6b7280" letter-spacing="1">
    Open in any browser. Works on iPhone, Android, Mac, Windows, Linux.
  </text>
</svg>
