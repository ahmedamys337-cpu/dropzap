<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760" width="1270" height="760">
  <!-- Gallery image #2: the "what it does" grid. Eight platform tiles
       laid out 4x2. Each tile uses its real brand color so visitors
       instantly recognize what they're looking at. -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="igGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="ttGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="fbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="rdGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="pinGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#9f1239"/>
    </linearGradient>
    <linearGradient id="ytGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#991b1b"/>
    </linearGradient>
    <linearGradient id="thGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="brandGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="1270" height="760" fill="url(#bg3)"/>

  <!-- Heading -->
  <text x="635" y="90" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="48" font-weight="900" fill="white" letter-spacing="-1.5">
    8 platforms. One tool.
  </text>
  <text x="635" y="135" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="22" font-weight="400" fill="#a0a0c0">
    Stop juggling five different downloaders.
  </text>

  <!-- Platform grid: 4 columns x 2 rows, tile = 260x220 with 30px gap -->
  <!-- Row 1 -->
  <g transform="translate(125, 185)">
    <rect width="260" height="220" rx="24" fill="url(#igGrad)"/>
    <text x="130" y="120" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="36" font-weight="800" fill="white">Instagram</text>
    <text x="130" y="160" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">Reels · Posts · Stories</text>
    <text x="130" y="184" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">Carousels (ZIP export)</text>
  </g>

  <g transform="translate(415, 185)">
    <rect width="260" height="220" rx="24" fill="url(#ttGrad)"/>
    <text x="130" y="120" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="36" font-weight="800" fill="white">TikTok</text>
    <text x="130" y="160" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">No watermark</text>
    <text x="130" y="184" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">Slideshows supported</text>
  </g>

  <g transform="translate(705, 185)">
    <rect width="260" height="220" rx="24" fill="url(#fbGrad)"/>
    <text x="130" y="120" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="36" font-weight="800" fill="white">Facebook</text>
    <text x="130" y="160" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">HD video &amp; reels</text>
    <text x="130" y="184" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">Photos &amp; albums</text>
  </g>

  <g transform="translate(995, 185)">
    <rect width="160" height="220" rx="24" fill="url(#xGrad)"/>
    <text x="80" y="120" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="36" font-weight="800" fill="white">X</text>
    <text x="80" y="160" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="14" font-weight="500" fill="rgba(255,255,255,0.85)">Twitter videos</text>
    <text x="80" y="182" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="14" font-weight="500" fill="rgba(255,255,255,0.85)">All resolutions</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(125, 435)">
    <rect width="260" height="220" rx="24" fill="url(#rdGrad)"/>
    <text x="130" y="120" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="36" font-weight="800" fill="white">Reddit</text>
    <text x="130" y="160" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">Audio-merged videos</text>
    <text x="130" y="184" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">v.redd.it supported</text>
  </g>

  <g transform="translate(415, 435)">
    <rect width="260" height="220" rx="24" fill="url(#pinGrad)"/>
    <text x="130" y="120" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="36" font-weight="800" fill="white">Pinterest</text>
    <text x="130" y="160" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">Pin images &amp; videos</text>
    <text x="130" y="184" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">Original quality</text>
  </g>

  <g transform="translate(705, 435)">
    <rect width="260" height="220" rx="24" fill="url(#ytGrad)"/>
    <text x="130" y="115" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="32" font-weight="800" fill="white">YouTube</text>
    <text x="130" y="150" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="16" font-weight="600" fill="white">Thumbnails</text>
    <text x="130" y="180" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="14" font-weight="500" fill="rgba(255,255,255,0.85)">Up to 4K HDR resolution</text>
  </g>

  <g transform="translate(995, 435)">
    <rect width="160" height="220" rx="24" fill="url(#thGrad)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <text x="80" y="120" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="32" font-weight="800" fill="white">Threads</text>
    <text x="80" y="160" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="14" font-weight="500" fill="rgba(255,255,255,0.85)">Videos &amp;</text>
    <text x="80" y="180" text-anchor="middle"
          font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="14" font-weight="500" fill="rgba(255,255,255,0.85)">images</text>
  </g>

  <!-- Bonus row -->
  <text x="635" y="715" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="18" font-weight="500" fill="#a0a0c0">
    Plus: built-in MP3 audio extraction from any video file.
  </text>
</svg>
