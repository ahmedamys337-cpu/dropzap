<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760" width="1270" height="760">
  <!-- Gallery image #4: the feature grid. Six benefit cards laid out
       3x2 with brand-gradient icon backgrounds. -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="cardGrad5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <rect width="1270" height="760" fill="url(#bg5)"/>

  <!-- Heading -->
  <text x="635" y="90" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="48" font-weight="900" fill="white" letter-spacing="-1.5">
    Built for the edge cases.
  </text>
  <text x="635" y="135" text-anchor="middle"
        font-family="system-ui, -apple-system, Segoe UI, sans-serif"
        font-size="22" font-weight="400" fill="#a0a0c0">
    The stuff every other downloader gets wrong.
  </text>

  <!-- Feature grid: 3 columns x 2 rows. Card 360x230. -->
  <!-- Card 1: No watermark -->
  <g transform="translate(85, 195)">
    <rect width="360" height="230" rx="20" fill="url(#cardGrad5)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="30" y="30" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <text x="58" y="64" text-anchor="middle"
          font-family="Segoe UI, sans-serif" font-size="28" font-weight="900" fill="white">✕</text>
    <text x="30" y="120" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="24" font-weight="800" fill="white">No watermark</text>
    <text x="30" y="155" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">TikTok videos download clean —</text>
    <text x="30" y="178" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">no logo overlay, no username</text>
    <text x="30" y="201" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">stamp, just the original video.</text>
  </g>

  <!-- Card 2: Carousel ZIP -->
  <g transform="translate(455, 195)">
    <rect width="360" height="230" rx="20" fill="url(#cardGrad5)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="30" y="30" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <g transform="translate(46, 46)">
      <rect x="2" y="2" width="20" height="24" rx="3" fill="white" opacity="0.4"/>
      <rect x="0" y="0" width="20" height="24" rx="3" fill="white"/>
    </g>
    <text x="30" y="120" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="24" font-weight="800" fill="white">Carousel → ZIP</text>
    <text x="30" y="155" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">Multi-slide Instagram posts</text>
    <text x="30" y="178" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">download as a single ZIP file —</text>
    <text x="30" y="201" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">no manual save-each-image.</text>
  </g>

  <!-- Card 3: Audio merged -->
  <g transform="translate(825, 195)">
    <rect width="360" height="230" rx="20" fill="url(#cardGrad5)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="30" y="30" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <g transform="translate(48, 48)">
      <rect x="-4" y="-4" width="4" height="16" rx="1" fill="white"/>
      <rect x="2" y="-10" width="4" height="28" rx="1" fill="white"/>
      <rect x="8" y="-6" width="4" height="20" rx="1" fill="white"/>
      <rect x="14" y="-12" width="4" height="32" rx="1" fill="white"/>
      <rect x="20" y="-8" width="4" height="24" rx="1" fill="white"/>
    </g>
    <text x="30" y="120" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="24" font-weight="800" fill="white">Reddit audio merged</text>
    <text x="30" y="155" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">Reddit splits video and audio</text>
    <text x="30" y="178" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">into two files. We re-merge them</text>
    <text x="30" y="201" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">into one playable MP4.</text>
  </g>

  <!-- Card 4: Original quality -->
  <g transform="translate(85, 460)">
    <rect width="360" height="230" rx="20" fill="url(#cardGrad5)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="30" y="30" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <text x="58" y="68" text-anchor="middle"
          font-family="Segoe UI, sans-serif" font-size="22" font-weight="900" fill="white">HD</text>
    <text x="30" y="120" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="24" font-weight="800" fill="white">Original quality</text>
    <text x="30" y="155" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">Whatever the platform served</text>
    <text x="30" y="178" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">is what you get — no re-encoding,</text>
    <text x="30" y="201" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">no compression artifacts.</text>
  </g>

  <!-- Card 5: MP3 converter -->
  <g transform="translate(455, 460)">
    <rect width="360" height="230" rx="20" fill="url(#cardGrad5)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="30" y="30" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <text x="58" y="66" text-anchor="middle"
          font-family="Segoe UI, sans-serif" font-size="18" font-weight="900" fill="white">MP3</text>
    <text x="30" y="120" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="24" font-weight="800" fill="white">MP3 extraction</text>
    <text x="30" y="155" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">Upload any video file and get</text>
    <text x="30" y="178" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">a clean MP3 — perfect for</text>
    <text x="30" y="201" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">podcasts, samples, voice notes.</text>
  </g>

  <!-- Card 6: Free forever -->
  <g transform="translate(825, 460)">
    <rect width="360" height="230" rx="20" fill="url(#cardGrad5)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <rect x="30" y="30" width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <text x="58" y="68" text-anchor="middle"
          font-family="Segoe UI, sans-serif" font-size="32" font-weight="900" fill="white">$0</text>
    <text x="30" y="120" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="24" font-weight="800" fill="white">Free forever</text>
    <text x="30" y="155" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">No signup, no paywall, no</text>
    <text x="30" y="178" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">"premium" tier. Ad-supported</text>
    <text x="30" y="201" font-family="Segoe UI, Segoe UI, sans-serif"
          font-size="16" font-weight="400" fill="#a0a0c0">so the tool stays free for everyone.</text>
  </g>
</svg>
