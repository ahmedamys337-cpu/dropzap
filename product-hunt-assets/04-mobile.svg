<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1270 760" width="1270" height="760">
  <!-- Gallery image #3: mobile-first proof. iPhone mockup on the left,
       benefit copy on the right. This is the slide that differentiates
       DropZap from desktop-only competitors. -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#1a0d2e"/>
    </linearGradient>
    <linearGradient id="phoneScreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="bolt4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="btnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="phoneGlow" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="rgba(147, 51, 234, 0.5)"/>
      <stop offset="100%" stop-color="rgba(147, 51, 234, 0)"/>
    </radialGradient>
  </defs>

  <rect width="1270" height="760" fill="url(#bg4)"/>

  <!-- Glow behind phone -->
  <ellipse cx="340" cy="380" rx="320" ry="380" fill="url(#phoneGlow)"/>

  <!-- iPhone mockup -->
  <g transform="translate(220, 90)">
    <!-- Outer frame -->
    <rect width="240" height="580" rx="44" fill="#0a0a0a" stroke="#2a2a3a" stroke-width="2"/>
    <!-- Screen bezel -->
    <rect x="10" y="10" width="220" height="560" rx="36" fill="url(#phoneScreen)"/>
    <!-- Dynamic island -->
    <rect x="95" y="22" width="50" height="14" rx="7" fill="#000"/>

    <!-- App UI inside phone -->
    <!-- Top bar -->
    <g transform="translate(28, 60)">
      <rect width="34" height="34" rx="8" fill="url(#bolt4)"/>
      <path d="M 20 8 L 11 22 L 16 22 L 13 32 L 22 18 L 17 18 L 20 8 Z" fill="white"/>
      <text x="44" y="22" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
            font-size="16" font-weight="800" fill="white">DropZap</text>
    </g>

    <!-- Tab strip -->
    <g transform="translate(28, 115)">
      <rect width="184" height="34" rx="10" fill="rgba(255,255,255,0.06)"/>
      <rect x="2" y="2" width="44" height="30" rx="8" fill="rgba(236, 72, 153, 0.25)"/>
      <text x="24" y="22" text-anchor="middle"
            font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#ec4899">IG</text>
      <text x="60" y="22" text-anchor="middle"
            font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#a0a0c0">TT</text>
      <text x="92" y="22" text-anchor="middle"
            font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#a0a0c0">FB</text>
      <text x="124" y="22" text-anchor="middle"
            font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#a0a0c0">X</text>
      <text x="156" y="22" text-anchor="middle"
            font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#a0a0c0">RD</text>
    </g>

    <!-- Heading -->
    <text x="28" y="180" font-family="system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="700" fill="white">Instagram Downloader</text>
    <text x="28" y="200" font-family="system-ui, -apple-system, sans-serif"
          font-size="9" font-weight="400" fill="#a0a0c0">Reels, posts, carousels, stories.</text>

    <!-- URL input field -->
    <g transform="translate(28, 215)">
      <rect width="184" height="46" rx="12" fill="rgba(255,255,255,0.05)" stroke="rgba(236, 72, 153, 0.3)" stroke-width="1.5"/>
      <text x="14" y="22" font-family="system-ui, sans-serif"
            font-size="9" font-weight="500" fill="#a0a0c0">Paste Instagram URL</text>
      <text x="14" y="36" font-family="system-ui, sans-serif"
            font-size="9" font-weight="400" fill="#6b7280">https://instagram.com/...</text>
    </g>

    <!-- Output chips -->
    <g transform="translate(28, 275)">
      <rect width="60" height="22" rx="11" fill="rgba(249, 115, 22, 0.15)" stroke="rgba(249, 115, 22, 0.4)" stroke-width="1"/>
      <text x="30" y="15" text-anchor="middle"
            font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#f97316">MP4 · HD</text>
      <rect x="68" width="80" height="22" rx="11" fill="rgba(236, 72, 153, 0.15)" stroke="rgba(236, 72, 153, 0.4)" stroke-width="1"/>
      <text x="108" y="15" text-anchor="middle"
            font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#ec4899">Carousel → ZIP</text>
    </g>

    <!-- Download button -->
    <g transform="translate(28, 315)">
      <rect width="184" height="48" rx="12" fill="url(#btnGrad)"/>
      <text x="92" y="30" text-anchor="middle"
            font-family="system-ui, -apple-system, sans-serif"
            font-size="14" font-weight="800" fill="white">↓ Download</text>
    </g>

    <!-- Footer note -->
    <text x="120" y="385" text-anchor="middle"
          font-family="system-ui, sans-serif" font-size="9" font-weight="400" fill="#6b7280">
      Pulls every slide of a carousel in original quality.
    </text>
  </g>

  <!-- Right side content -->
  <g transform="translate(620, 0)">
    <!-- Eyebrow -->
    <text x="0" y="170" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="18" font-weight="700" fill="#ec4899" letter-spacing="3">
      MOBILE-FIRST
    </text>

    <!-- Big claim -->
    <text x="0" y="240" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="56" font-weight="900" fill="white" letter-spacing="-1.5">
      Works on your phone.
    </text>
    <text x="0" y="305" font-family="system-ui, -apple-system, Segoe UI, sans-serif"
          font-size="56" font-weight="900" fill="white" letter-spacing="-1.5">
      No app required.
    </text>

    <!-- Bullets -->
    <g transform="translate(0, 360)">
      <g transform="translate(0, 0)">
        <circle cx="14" cy="14" r="14" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="2"/>
        <path d="M 8 14 L 12 18 L 20 10" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="42" y="20" font-family="system-ui, -apple-system, sans-serif"
              font-size="22" font-weight="500" fill="#e0e0f0">
          Opens directly in Safari (iPhone) or Chrome (Android)
        </text>
      </g>
      <g transform="translate(0, 50)">
        <circle cx="14" cy="14" r="14" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="2"/>
        <path d="M 8 14 L 12 18 L 20 10" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="42" y="20" font-family="system-ui, -apple-system, sans-serif"
              font-size="22" font-weight="500" fill="#e0e0f0">
          No App Store install, no browser extension
        </text>
      </g>
      <g transform="translate(0, 100)">
        <circle cx="14" cy="14" r="14" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="2"/>
        <path d="M 8 14 L 12 18 L 20 10" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="42" y="20" font-family="system-ui, -apple-system, sans-serif"
              font-size="22" font-weight="500" fill="#e0e0f0">
          Saves directly to Photos / Downloads folder
        </text>
      </g>
      <g transform="translate(0, 150)">
        <circle cx="14" cy="14" r="14" fill="rgba(236, 72, 153, 0.2)" stroke="#ec4899" stroke-width="2"/>
        <path d="M 8 14 L 12 18 L 20 10" fill="none" stroke="#ec4899" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="42" y="20" font-family="system-ui, -apple-system, sans-serif"
              font-size="22" font-weight="500" fill="#e0e0f0">
          One UI for every platform — no app switching
        </text>
      </g>
    </g>
  </g>
</svg>
