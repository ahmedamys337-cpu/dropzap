<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- DropZap Product Hunt thumbnail. 240x240, exactly the PH-required size.
       Pure brand expression: the lightning bolt on the full brand gradient.
       Bold, recognizable at thumbnail dimensions, no text (PH renders this
       at ~48-80px on the leaderboard where text would be unreadable). -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="45%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="boltShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square brand panel -->
  <rect x="0" y="0" width="240" height="240" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Subtle inner glow / depth -->
  <rect x="0" y="0" width="240" height="240" rx="48" ry="48"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

  <!-- Lightning bolt (centered, white, filled) -->
  <g filter="url(#boltShadow)">
    <path d="M 138 50
             L 78 130
             L 112 130
             L 102 190
             L 162 110
             L 128 110
             L 138 50 Z"
          fill="white"/>
  </g>
</svg>
