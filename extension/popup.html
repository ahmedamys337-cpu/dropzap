<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropZap</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f0f0f;
      color: #fff;
    }
    .container { padding: 16px; }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { stroke: #fff; width: 20px; height: 20px; }
    .title { font-size: 18px; font-weight: 800; margin: 0; }
    .subtitle { font-size: 12px; color: #a1a1aa; margin-top: 2px; }
    .status {
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.4;
    }
    .status.supported { background: rgba(34, 197, 94, 0.12); border: 1px solid rgba(34, 197, 94, 0.25); }
    .status.unsupported { background: rgba(239, 68, 68, 0.12); border: 1px solid rgba(239, 68, 68, 0.25); }
    .status strong { display: block; margin-bottom: 4px; }
    .supported strong { color: #4ade80; }
    .unsupported strong { color: #f87171; }
    .url {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      word-break: break-all;
      color: #d4d4d8;
      margin-bottom: 12px;
      max-height: 60px;
      overflow: auto;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%);
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.1s ease;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.95; }
    .btn:active { transform: scale(0.98); }
    .btn svg { width: 18px; height: 18px; }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #71717a;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
        </svg>
      </div>
      <div>
        <div class="title">DropZap</div>
        <div class="subtitle">Free social media downloader</div>
      </div>
    </div>

    <div id="statusSupported" class="status supported hidden">
      <strong>✓ This page is supported</strong>
      Click below to download this video with DropZap.
    </div>
    <div id="statusUnsupported" class="status unsupported hidden">
      <strong>Not supported on this page</strong>
      Open a TikTok, Instagram, Facebook, X/Twitter, Reddit, Pinterest, or Threads post.
    </div>

    <div id="pageUrl" class="url hidden"></div>

    <a id="downloadBtn" class="btn hidden" href="#" target="_blank" rel="noopener noreferrer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download with DropZap
    </a>

    <a id="homeBtn" class="btn" href="https://www.dropzap.digital" target="_blank" rel="noopener noreferrer">
      Open DropZap
    </a>

    <div class="footer">No watermark · No signup · No daily limit</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
