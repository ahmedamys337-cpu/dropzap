name: SEO Outreach Daily Digest

# Runs once a day at 06:00 UTC (11:00 AM Karachi / 02:00 AM EST).
# Adjust the cron if you'd rather get the report at a different time.
# Format is standard 5-field cron: minute hour day month weekday.
on:
  schedule:
    - cron: "0 6 * * *"
  # Also runnable manually from the Actions tab whenever you want a
  # fresh report on demand.
  workflow_dispatch:

# We need write permission so the workflow can commit the new digest
# file back to the repo. GitHub Actions defaults to read-only since
# 2023 — this is the explicit grant.
permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run SEO outreach digest
        env:
          # Brand-mention tracker (optional — module gracefully no-ops
          # if these aren't set). Add as repo secrets:
          # Settings → Secrets and variables → Actions → New secret.
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}

          # Email delivery (optional — module gracefully no-ops if
          # these aren't set).
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SEO_EMAIL_FROM: ${{ secrets.SEO_EMAIL_FROM }}
          SEO_EMAIL_TO: ${{ secrets.SEO_EMAIL_TO }}
        run: node scripts/seo-outreach/index.mjs

      - name: Commit digest to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add seo-reports/
          if git diff --staged --quiet; then
            echo "No digest changes to commit."
          else
            git commit -m "chore(seo): daily outreach digest [skip ci]"
            git push
          fi
