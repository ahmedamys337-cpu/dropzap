# DropZap SEO Backlink Automation
#
# Runs automatically every day at 08:00 UTC.
# Can also be triggered manually from GitHub Actions → "Run workflow".
#
# HOW TO SET UP SECRETS:
#   GitHub repo → Settings → Secrets and variables → Actions → New repository secret
#   Add each of the secrets listed in the "env:" block below.
#
# WHICH SECRETS ARE REQUIRED:
#   • DEVTO_API_KEY           → https://dev.to/settings/extensions
#   • MEDIUM_INTEGRATION_TOKEN → https://medium.com/me/settings (Integration tokens)
#   • HACKMD_API_TOKEN        → https://hackmd.io/settings#api
#   • GITHUB_GIST_TOKEN       → https://github.com/settings/tokens/new (gist scope)
#   • TUMBLR_BLOG_NAME        → your blog name e.g. "dropzap-media"
#   • TUMBLR_CONSUMER_KEY     → https://www.tumblr.com/oauth/apps
#   • TUMBLR_CONSUMER_SECRET  → same page
#   • TUMBLR_ACCESS_TOKEN     → from OAuth flow
#   • TUMBLR_TOKEN_SECRET     → from OAuth flow
#   • DIIGO_USERNAME          → your Diigo account username
#   • DIIGO_API_KEY           → https://www.diigo.com/api_keys/new/
#   • REDDIT_CLIENT_ID        → https://www.reddit.com/prefs/apps
#   • REDDIT_CLIENT_SECRET    → same page
#   • REDDIT_USERNAME         → Reddit username
#   • REDDIT_PASSWORD         → Reddit password
#
# Missing secrets = that platform is skipped with a warning (no crash).

name: "SEO Backlink Automation"

on:
  schedule:
    # Every day at 08:00 UTC (1 PM Pakistan time)
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to run (all / github / devto / medium / hackmd / tumblr / diigo / reddit)"
        required: false
        default: "all"
      dry_run:
        description: "Dry run (no actual posts)"
        required: false
        type: boolean
        default: false

jobs:
  backlinks:
    name: "Publish Backlinks"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run SEO outreach — daily digest (Reddit opportunities + brand mentions)
        env:
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
        run: node scripts/seo-outreach/index.mjs
        continue-on-error: true

      - name: Run backlink automation
        env:
          # Article publishers
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          MEDIUM_INTEGRATION_TOKEN: ${{ secrets.MEDIUM_INTEGRATION_TOKEN }}
          HACKMD_API_TOKEN: ${{ secrets.HACKMD_API_TOKEN }}
          # GitHub Gists
          GITHUB_GIST_TOKEN: ${{ secrets.GITHUB_GIST_TOKEN }}
          # Tumblr
          TUMBLR_BLOG_NAME: ${{ secrets.TUMBLR_BLOG_NAME }}
          TUMBLR_CONSUMER_KEY: ${{ secrets.TUMBLR_CONSUMER_KEY }}
          TUMBLR_CONSUMER_SECRET: ${{ secrets.TUMBLR_CONSUMER_SECRET }}
          TUMBLR_ACCESS_TOKEN: ${{ secrets.TUMBLR_ACCESS_TOKEN }}
          TUMBLR_TOKEN_SECRET: ${{ secrets.TUMBLR_TOKEN_SECRET }}
          # Diigo
          DIIGO_USERNAME: ${{ secrets.DIIGO_USERNAME }}
          DIIGO_API_KEY: ${{ secrets.DIIGO_API_KEY }}
          # Reddit
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
        run: |
          PLATFORM="${{ github.event.inputs.platform || 'all' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          ARGS=""
          if [ "$PLATFORM" != "all" ]; then ARGS="--only=$PLATFORM"; fi
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          node scripts/seo-outreach/run-all.mjs $ARGS

      - name: Upload digest report (if generated)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: seo-digest-${{ github.run_number }}
          path: seo-reports/
          if-no-files-found: ignore
          retention-days: 30
